<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevDex | Trainer Profile</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=VT323&display=swap" rel="stylesheet">

  <style>
    /* 
     * =========================================
     * DESIGN SYSTEM & VARIABLES
     * =========================================
     */
    :root {
      /* Colors */
      --bg: #0a0a0f;
      --bg-card: #111827;
      --bg-panel: #1f2937;
      --purple: #7c3aed;
      --cherry: #dc2626;
      --yellow: #fbbf24;
      --blue: #3b82f6;
      --green: #10b981;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      
      /* Spacing */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;

      /* Borders */
      --border-pixel: 4px solid var(--text);
      --border-thin: 2px solid var(--text-muted);
      
      /* Fonts */
      --font-title: 'VT323', monospace;
      --font-body: 'Fira Code', monospace;
    }

    /* 
     * =========================================
     * RESET & BASE STYLES
     * =========================================
     */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline Overlay */
    body::after {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.6;
    }

    h1, h2, h3, h4 { font-family: var(--font-title); text-transform: uppercase; letter-spacing: 2px; }
    a { color: var(--blue); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--yellow); }
    ul { list-style: none; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: var(--spacing-lg);
    }

    /* Pixel Border Utility */
    .pixel-border {
      position: relative;
      border: 2px solid var(--text-muted);
      box-shadow: 
        -4px 0 0 0 var(--text-muted),
        4px 0 0 0 var(--text-muted),
        0 -4px 0 0 var(--text-muted),
        0 4px 0 0 var(--text-muted);
      margin: 4px;
    }

    /* Section Headers */
    .section-header {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
      border-bottom: 2px solid var(--purple);
      padding-bottom: var(--spacing-xs);
    }
    .section-header h2 { font-size: 2.5rem; color: var(--purple); }
    .terminal-prompt { color: var(--green); font-weight: bold; }

    /* 
     * =========================================
     * TRAINER PROFILE (Gen 2/3 Style)
     * =========================================
     */
    .trainer-section { margin-bottom: var(--spacing-xl); }
    
    .trainer-card {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: var(--spacing-md);
      background: var(--bg-card);
      padding: var(--spacing-md);
      align-items: start;
    }

    .trainer-avatar {
      width: 80px;
      height: 80px;
      background: var(--bg-panel);
      border: 2px solid var(--text);
      image-rendering: pixelated;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .trainer-info h1 { font-size: 2.5rem; color: var(--yellow); margin-bottom: 0.25rem; }
    .trainer-meta { display: flex; gap: var(--spacing-md); flex-wrap: wrap; margin-bottom: var(--spacing-sm); font-size: 0.9rem; color: var(--text-muted); }
    .trainer-meta span { display: flex; align-items: center; gap: 0.25rem; }
    .trainer-desc { font-size: 1.1rem; border-left: 3px solid var(--cherry); padding-left: var(--spacing-sm); color: var(--text); }

    /* 
     * =========================================
     * SKILLS POKEDEX (Main Captured)
     * =========================================
     */
    .skills-section { margin-bottom: var(--spacing-xl); }
    
    .main-skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--spacing-md);
    }

    .skill-card {
      background: var(--bg-card);
      padding: var(--spacing-md);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .skill-card:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px var(--purple);
    }

    .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacing-sm); }
    .skill-name { font-family: var(--font-title); font-size: 1.5rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
    .skill-icon { font-size: 1.5rem; }
    
    /* Pokéball Indicator for Active Skills */
    .skill-active-indicator {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, white 20%, var(--cherry) 21%, var(--cherry) 45%, white 46%, white 55%, var(--bg) 56%);
      border: 1px solid var(--text-muted);
      display: inline-block;
    }

    .level-bar-container {
      background: var(--bg);
      height: 12px;
      border: 2px solid var(--text-muted);
      margin: var(--spacing-sm) 0;
      position: relative;
    }
    
    .level-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      width: 0%; /* Dynamic */
      transition: width 1s ease-out;
    }

    .level-text {
      position: absolute;
      top: -20px; right: 0;
      font-size: 0.8rem;
      color: var(--yellow);
      font-weight: bold;
    }

    .moveset-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: var(--spacing-sm);
    }

    .move-tag {
      background: var(--bg-panel);
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      border: 1px solid var(--text-muted);
      border-radius: 2px;
    }

    /* 
     * =========================================
     * PC BOX (All Skills Interactive)
     * =========================================
     */
    .pc-box-section { margin-bottom: var(--spacing-xl); }
    
    .pc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--spacing-sm);
    }

    .pc-card {
      background: var(--bg-card);
      border: 2px solid var(--text-muted);
      padding: var(--spacing-sm);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .pc-card:hover {
      border-color: var(--blue);
      background: var(--bg-panel);
      transform: translateY(-2px);
    }

    .pc-card.seen { opacity: 0.5; filter: grayscale(0.8); }
    .pc-card.studied { border-bottom: 3px solid var(--blue); }
    .pc-card.active { border: 2px solid var(--green); box-shadow: 0 0 8px var(--green); }

    .pc-icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
    .pc-name { font-family: var(--font-title); font-size: 1.1rem; }
    
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin: 4px auto 0;
      display: block;
    }
    .status-active { background: var(--green); }
    .status-studied { background: var(--blue); }
    .status-seen { background: var(--text-muted); }

    /* Skill Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }
    
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-content {
      background: var(--bg-card);
      border: 4px solid var(--purple);
      padding: var(--spacing-lg);
      max-width: 500px;
      width: 90%;
      position: relative;
      transform: scale(0.9);
      transition: transform 0.3s;
      box-shadow: 0 0 30px var(--purple);
    }

    .modal-overlay.open .modal-content { transform: scale(1); }

    .modal-close {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-muted);
      font-family: var(--font-title);
    }
    .modal-close:hover { color: var(--cherry); }

    /* 
     * =========================================
     * GYM BADGES (Experiences)
     * =========================================
     */
    .gym-section { margin-bottom: var(--spacing-xl); }
    
    .gym-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--spacing-md);
    }

    .gym-badge {
      background: var(--bg-card);
      padding: var(--spacing-md);
      text-align: center;
      border-top: 4px solid var(--purple);
      transition: transform 0.2s;
      position: relative;
    }

    .gym-badge:hover { transform: translateY(-4px); box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3); }

    .gym-icon { font-size: 3rem; margin-bottom: var(--spacing-xs); display: block; }
    .gym-company { font-family: var(--font-title); font-size: 1.4rem; color: var(--yellow); }
    .gym-role { font-size: 0.9rem; color: var(--blue); margin-bottom: 0.5rem; font-weight: 600; }
    .gym-period { font-size: 0.8rem; color: var(--text-muted); margin-bottom: var(--spacing-sm); font-style: italic; }
    .gym-summary { font-size: 0.85rem; text-align: left; line-height: 1.4; }

    .badge-rarity {
      position: absolute;
      top: 5px; right: 5px;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .rarity-legendary { background: var(--yellow); color: #000; }
    .rarity-elite { background: var(--purple); color: #fff; }
    .rarity-rare { background: var(--blue); color: #fff; }
    .rarity-common { background: var(--text-muted); color: #000; }

    /* 
     * =========================================
     * OTHER LISTS (Courses, Certs, Education, Blog)
     * =========================================
     */
    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-md);
    }

    .info-card {
      background: var(--bg-card);
      padding: var(--spacing-md);
      border-left: 4px solid var(--blue);
      transition: transform 0.2s;
    }
    .info-card:hover { transform: translateX(4px); }

    .info-title { font-family: var(--font-title); font-size: 1.3rem; color: var(--text); margin-bottom: 0.5rem; }
    .info-sub { font-size: 0.9rem; color: var(--blue); margin-bottom: 0.5rem; }
    .info-meta { font-size: 0.8rem; color: var(--text-muted); margin-bottom: var(--spacing-sm); }
    .info-desc { font-size: 0.9rem; }

    /* Blog Specific */
    .blog-card { border-left-color: var(--cherry); }
    .blog-date { color: var(--cherry); font-weight: bold; }

    /* 
     * =========================================
     * RESPONSIVE MEDIA QUERIES
     * =========================================
     */
    @media (max-width: 1024px) {
      .gym-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .trainer-card { grid-template-columns: 1fr; text-align: center; }
      .trainer-avatar { margin: 0 auto; }
      .trainer-desc { border-left: none; border-top: 3px solid var(--cherry); padding-top: var(--spacing-sm); padding-left: 0; }
      .trainer-meta { justify-content: center; }
      .gym-grid { grid-template-columns: 1fr; }
      .section-header h2 { font-size: 2rem; }
    }

    @media (max-width: 480px) {
      .pc-grid { grid-template-columns: repeat(2, 1fr); }
      .container { padding: var(--spacing-sm); }
    }

    /* Accessibility: Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
      body::after { display: none; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- TRAINER PROFILE -->
    <section class="trainer-section" aria-labelledby="trainer-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="trainer-title">Trainer Info</h2>
      </div>
      <div class="trainer-card pixel-border" id="trainer-container">
        <!-- Injected via JS -->
        <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Loading Trainer Data...</div>
      </div>
    </section>

    <!-- MAIN SKILLS (Captured) -->
    <section class="skills-section" aria-labelledby="skills-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="skills-title">Captured Skills</h2>
      </div>
      <div class="main-skills-grid" id="main-skills-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- PC BOX (All Skills) -->
    <section class="pc-box-section" aria-labelledby="pc-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="pc-title">PC Box Storage</h2>
      </div>
      <div class="pc-grid" id="pc-box-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- GYM BADGES (Experiences) -->
    <section class="gym-section" aria-labelledby="gym-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="gym-title">Gym Badges</h2>
      </div>
      <div class="gym-grid" id="gym-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- EDUCATION -->
    <section class="gym-section" aria-labelledby="edu-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="edu-title">Education</h2>
      </div>
      <div class="list-grid" id="education-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- COURSES -->
    <section class="gym-section" aria-labelledby="courses-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="courses-title">Training Courses</h2>
      </div>
      <div class="list-grid" id="courses-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- CERTIFICATIONS -->
    <section class="gym-section" aria-labelledby="certs-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="certs-title">Certifications</h2>
      </div>
      <div class="list-grid" id="certs-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- PROJECTS -->
    <section class="gym-section" aria-labelledby="projects-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="projects-title">Side Projects</h2>
      </div>
      <div class="list-grid" id="projects-container">
        <!-- Injected via JS -->
      </div>
    </section>

    <!-- BLOG -->
    <section class="gym-section" aria-labelledby="blog-title">
      <div class="section-header">
        <span class="terminal-prompt">></span>
        <h2 id="blog-title">Log Entries</h2>
      </div>
      <div class="list-grid" id="blog-container">
        <!-- Injected via JS -->
      </div>
    </section>

  </div>

  <!-- MODAL FOR SKILLS -->
  <div class="modal-overlay" id="skill-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn" aria-label="Close modal">&times;</button>
      <div id="modal-body">
        <!-- Dynamic Content -->
      </div>
    </div>
  </div>

  <script>
    /**
     * =========================================
     * DATA SCHEMAS & VALIDATION PIPELINE
     * =========================================
     */
    
    // Define o contrato esperado para cada arquivo
    const SCHEMAS = {
      trainer: { required: ['name', 'title', 'type', 'region', 'avatar'], types: { name: 'string', title: 'string' } },
      skill: { required: ['name', 'level', 'state', 'isMain'], types: { name: 'string', level: 'number', state: 'string' } },
      experience: { required: ['company', 'role', 'period', 'summary'], types: { company: 'string', role: 'string' } },
      education: { required: ['school', 'degree', 'period'], types: { school: 'string', degree: 'string' } },
      course: { required: ['title', 'provider', 'year'], types: { title: 'string', provider: 'string' } },
      certification: { required: ['name', 'issuer', 'year'], types: { name: 'string', issuer: 'string' } },
      project: { required: ['title', 'description', 'tags'], types: { title: 'string', description: 'string' } },
      blog: { required: ['title', 'date', 'excerpt'], types: { title: 'string', date: 'string' } }
    };

    // Função de Validação
    function validateData(data, schemaName, index = '') {
      const schema = SCHEMAS[schemaName];
      if (!schema) return true; // Sem schema definido, passa direto

      const errors = [];
      
      // Checar campos obrigatórios
      schema.required.forEach(field => {
        if (data[field] === undefined || data[field] === null) {
          errors.push(`Missing field: '${field}'`);
        }
      });

      // Checar tipos básicos
      Object.entries(schema.types).forEach(([field, type]) => {
        if (data[field] !== undefined && typeof data[field] !== type) {
          errors.push(`Invalid type for '${field}': expected ${type}, got ${typeof data[field]}`);
        }
      });

      if (errors.length > 0) {
        console.warn(`⚠️ Validation failed for ${schemaName} ${index}:`, errors);
        return false;
      }
      return true;
    }

    // Pipeline de Fetch com Validação e Fallback
    async function fetchData(file, schemaName, isArray = false) {
      try {
        const response = await fetch(`data/${file}.json`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const json = await response.json();
        
        if (isArray && Array.isArray(json)) {
          // Validar cada item do array
          const validData = json.filter((item, idx) => 
            validateData(item, schemaName, `[${idx}]`)
          );
          
          if (validData.length === 0 && json.length > 0) {
            console.error(`❌ All items in ${file}.json failed validation. Using fallback.`);
            return getFallbackData(file);
          }
          return validData;
        } else if (!isArray) {
          // Validar objeto único
          if (validateData(json, schemaName)) {
            return json;
          } else {
            console.error(`❌ ${file}.json failed validation. Using fallback.`);
            return getFallbackData(file);
          }
        }
        return json;
      } catch (error) {
        console.warn(`⚠️ Could not load data/${file}.json (${error.message}). Using fallback data.`);
        return getFallbackData(file);
      }
    }

    /**
     * =========================================
     * FALLBACK DATA (HARDCODED SAFETY NET)
     * =========================================
     */
    function getFallbackData(file) {
      console.log(`🛡️ Loading fallback for ${file}`);
      switch(file) {
        case 'trainer':
          return { name: "Dev Trainer", title: "Full Stack Master", type: "Specialist", region: "Web Valley", avatar: "👨‍💻", description: "A seasoned developer dedicated to building accessible, retro-themed web interfaces." };
        case 'skills':
          return [
            { name: "JavaScript", level: 12, state: "active", isMain: true, icon: "⚡", moveset: ["ES6+", "Async/Await", "DOM"] },
            { name: "React", level: 10, state: "active", isMain: true, icon: "⚛️", moveset: ["Hooks", "Redux", "Next.js"] },
            { name: "Node.js", level: 9, state: "studied", isMain: true, icon: "🟢", moveset: ["Express", "API Design", "Streams"] },
            { name: "CSS", level: 14, state: "active", isMain: true, icon: "🎨", moveset: ["Grid", "Flexbox", "Animations"] },
            { name: "Git", level: 11, state: "active", isMain: false, icon: "📦" },
            { name: "Python", level: 7, state: "studied", isMain: false, icon: "🐍" },
            { name: "SQL", level: 8, state: "seen", isMain: false, icon: "🗄️" }
          ];
        case 'experiences':
          return [
            { company: "Tech Corp", role: "Senior Dev", period: "2020-Present", summary: "Led frontend architecture migration.", icon: "🏢", rarity: "legendary" },
            { company: "StartUp Inc", role: "Full Stack", period: "2018-2020", summary: "Built MVP from scratch.", icon: "🚀", rarity: "elite" }
          ];
        case 'education':
          return [{ school: "Uni of Tech", degree: "B.Sc. Computer Science", period: "2014-2018", icon: "🎓" }];
        case 'courses':
          return [{ title: "Advanced React", provider: "Online School", year: "2021", icon: "📚" }];
        case 'certifications':
          return [{ name: "AWS Certified", issuer: "Amazon", year: "2022", icon: "☁️" }];
        case 'projects':
          return [{ title: "Retro Dex", description: "Pokémon style portfolio.", tags: ["HTML", "CSS"], icon: "🎮" }];
        case 'blog':
          return [{ title: "Why Retro?", date: "2023-10-01", excerpt: "Exploring nostalgia in UI.", icon: "📝" }];
        default:
          return [];
      }
    }

    /**
     * =========================================
     * RENDER FUNCTIONS
     * =========================================
     */

    // Render Trainer
    function renderTrainer(data) {
      const container = document.getElementById('trainer-container');
      container.innerHTML = `
        <div class="trainer-avatar">${data.avatar || '👾'}</div>
        <div class="trainer-info">
          <h1>${data.name}</h1>
          <div class="trainer-meta">
            <span><strong>Title:</strong> ${data.title}</span>
            <span><strong>Type:</strong> ${data.type}</span>
            <span><strong>Region:</strong> ${data.region}</span>
          </div>
          <p class="trainer-desc">> ${data.description || 'No data available.'}</p>
        </div>
      `;
    }

    // Render Main Skills
    function renderMainSkills(skills) {
      const container = document.getElementById('main-skills-container');
      const mainSkills = skills.filter(s => s.isMain).slice(0, 6);
      
      if (mainSkills.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted)">No main skills captured yet.</p>';
        return;
      }

      container.innerHTML = mainSkills.map(skill => `
        <article class="skill-card pixel-border">
          <div class="skill-header">
            <div class="skill-name">
              <span class="skill-icon">${skill.icon || '⭐'}</span>
              ${skill.name}
            </div>
            ${skill.state === 'active' ? '<div class="skill-active-indicator" title="Active Skill"></div>' : ''}
          </div>
          
          <div class="level-bar-container">
            <div class="level-text">Lv.${Math.min(skill.level, 15)}</div>
            <div class="level-bar-fill" style="width: ${(Math.min(skill.level, 15) / 15) * 100}%"></div>
          </div>
          
          ${skill.moveset && skill.moveset.length > 0 ? `
            <div class="moveset-list">
              ${skill.moveset.map(move => `<span class="move-tag">${move}</span>`).join('')}
            </div>
          ` : ''}
        </article>
      `).join('');
    }

    // Render PC Box (All Skills)
    function renderPCBox(skills) {
      const container = document.getElementById('pc-box-container');
      
      container.innerHTML = skills.map((skill, index) => `
        <div class="pc-card ${skill.state} pixel-border" 
             tabindex="0" 
             role="button" 
             aria-label="View details for ${skill.name}"
             onclick="openSkillModal(${index})"
             onkeydown="if(event.key === 'Enter') openSkillModal(${index})">
          <span class="pc-icon">${skill.icon || '❓'}</span>
          <div class="pc-name">${skill.name}</div>
          <span class="status-dot status-${skill.state}"></span>
        </div>
      `).join('');
      
      // Store skills globally for modal access
      window.allSkills = skills;
    }

    // Render Gym Badges (Experiences)
    function renderExperiences(exps) {
      const container = document.getElementById('gym-container');
      container.innerHTML = exps.map(exp => `
        <div class="gym-badge pixel-border">
          <span class="badge-rarity rarity-${exp.rarity || 'common'}">${exp.rarity || 'Common'}</span>
          <span class="gym-icon">${exp.icon || '🏢'}</span>
          <h3 class="gym-company">${exp.company}</h3>
          <div class="gym-role">${exp.role}</div>
          <div class="gym-period">${exp.period}</div>
          <p class="gym-summary">${exp.summary}</p>
        </div>
      `).join('');
    }

    // Generic List Renderer (Education, Courses, Certs, Projects)
    function renderGenericList(data, containerId, type) {
      const container = document.getElementById(containerId);
      if (!data || data.length === 0) {
        container.innerHTML = `<p style="color:var(--text-muted)">No ${type} records found.</p>`;
        return;
      }

      const isBlog = type === 'blog';
      
      container.innerHTML = data.map(item => `
        <article class="info-card ${isBlog ? 'blog-card' : ''} pixel-border">
          <h3 class="info-title">${isBlog ? item.title : (item.name || item.title || item.school)}</h3>
          <div class="info-sub">${item.issuer || item.provider || item.degree || item.tags?.join(', ')}</div>
          <div class="info-meta ${isBlog ? 'blog-date' : ''}">${item.year || item.period || item.date}</div>
          <p class="info-desc">${item.excerpt || item.description || item.summary || ''}</p>
        </article>
      `).join('');
    }

    /**
     * =========================================
     * MODAL LOGIC
     * =========================================
     */
    const modal = document.getElementById('skill-modal');
    const modalBody = document.getElementById('modal-body');
    const closeBtn = document.getElementById('modal-close-btn');

    window.openSkillModal = function(index) {
      const skill = window.allSkills[index];
      if (!skill) return;

      const levelPercent = (Math.min(skill.level, 15) / 15) * 100;
      const statusColor = skill.state === 'active' ? 'var(--green)' : (skill.state === 'studied' ? 'var(--blue)' : 'var(--text-muted)');

      modalBody.innerHTML = `
        <div style="text-align:center; margin-bottom: 1rem;">
          <span style="font-size: 4rem; display:block;">${skill.icon || '❓'}</span>
          <h2 style="color: var(--yellow); font-size: 2rem;">${skill.name}</h2>
          <span style="background: ${statusColor}; color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; text-transform: uppercase;">${skill.state}</span>
        </div>
        
        <div style="margin: 1rem 0;">
          <div style="display:flex; justify-content:space-between; margin-bottom: 0.5rem;">
            <span>Proficiency Level</span>
            <span style="color: var(--yellow);">Lv.${Math.min(skill.level, 15)}/15</span>
          </div>
          <div class="level-bar-container" style="height: 20px; border: 3px solid var(--text);">
            <div class="level-bar-fill" style="width: ${levelPercent}%; background: linear-gradient(90deg, var(--green), var(--yellow));"></div>
          </div>
        </div>

        ${skill.moveset ? `
          <div>
            <h4 style="color: var(--purple); margin-bottom: 0.5rem;">Moveset:</h4>
            <div class="moveset-list">
              ${skill.moveset.map(m => `<span class="move-tag" style="font-size: 1rem; padding: 0.5rem;">${m}</span>`).join('')}
            </div>
          </div>
        ` : ''}
        
        ${skill.description ? `
          <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--text-muted);">
            <p>${skill.description}</p>
          </div>
        ` : ''}
      `;

      modal.classList.add('open');
      closeBtn.focus();
    };

    function closeModal() {
      modal.classList.remove('open');
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('open')) closeModal();
    });

    /**
     * =========================================
     * INITIALIZATION
     * =========================================
     */
    async function initPortfolio() {
      // Load all data in parallel
      const [trainer, skills, experiences, education, courses, certifications, projects, blog] = await Promise.all([
        fetchData('trainer', 'trainer', false),
        fetchData('skills', 'skill', true),
        fetchData('experiences', 'experience', true),
        fetchData('education', 'education', true),
        fetchData('courses', 'course', true),
        fetchData('certifications', 'certification', true),
        fetchData('projects', 'project', true),
        fetchData('blog', 'blog', true)
      ]);

      // Render sections
      renderTrainer(trainer);
      renderMainSkills(skills);
      renderPCBox(skills);
      renderExperiences(experiences);
      renderGenericList(education, 'education-container', 'education');
      renderGenericList(courses, 'courses-container', 'courses');
      renderGenericList(certifications, 'certs-container', 'certifications');
      renderGenericList(projects, 'projects-container', 'projects');
      renderGenericList(blog, 'blog-container', 'blog');
      
      console.log("✅ DevDex initialized successfully with dynamic data.");
    }

    // Start
    document.addEventListener('DOMContentLoaded', initPortfolio);

  </script>
</body>
</html>
