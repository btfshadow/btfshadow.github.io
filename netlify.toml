# Netlify headers to correctly serve Unity WebGL pre-compressed assets
# Ensures .gz files are served with Content-Encoding: gzip and correct Content-Type

[[headers]]
for = "/galaxy-shoter-pro/Build/*.framework.js.gz"
[headers.values]
  Content-Type = "application/javascript"
  Content-Encoding = "gzip"
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/galaxy-shoter-pro/Build/*.js.gz"
[headers.values]
  Content-Type = "application/javascript"
  Content-Encoding = "gzip"
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/galaxy-shoter-pro/Build/*.wasm.gz"
[headers.values]
  Content-Type = "application/wasm"
  Content-Encoding = "gzip"
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/galaxy-shoter-pro/Build/*.data.gz"
[headers.values]
  Content-Type = "application/octet-stream"
  Content-Encoding = "gzip"
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/galaxy-shoter-pro/Build/*.unityweb"
[headers.values]
  Content-Type = "application/octet-stream"
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/galaxy-shoter-pro/Build/*"
[headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
