name: AI Issue Analysis & Estimate

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  analyze-issue:
    if: github.event.label.name == 'ok' && github.triggering_actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get issue body
        id: get_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.get({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.setOutput('body', issue.data.body || '');
            core.setOutput('title', issue.data.title || '');

      - name: Analyze with Ollama
        uses: ai-action/ollama-action@v2
        id: ollama
        with:
          model: ${{ vars.OLLAMA_MODEL || 'llama3.2' }}
          prompt: |
            SYSTEM: You are a strict software project analyst. Output ONLY valid Markdown.
            RULES:
            1. NO terminal codes, NO ANSI sequences, NO progress bars, NO repetition.
            2. DO NOT explain. DO NOT add text before or after the Markdown.
            3. Follow the template EXACTLY. Replace brackets with real values.
            4. If a value is unknown, use "N/A". Do not leave empty fields.

            INPUT:
            Title: ${{ steps.get_issue.outputs.title }}
            Description: ${{ steps.get_issue.outputs.body }}

            TEMPLATE:
            ## 🤖 Análise Automática por IA

            ### 📋 Resumo
            [1-2 frases resumindo a solicitação]

            ### 💰 Orçamento Estimado
            - **Complexidade:** [Baixa|Média|Alta]
            - **Horas estimadas:** [número]h
            - **Valor estimado:** R$ [número.00]

            ### 🛠️ Stack Sugerida
            - `[tecnologia]`
            - `[tecnologia]`
            - `[tecnologia]`

            ### 🚀 Prompt para Iniciar o Projeto
            <details>
            <summary>Clique para ver o prompt gerado pela IA</summary>

            ```text
            [Prompt técnico detalhado para IA iniciar o desenvolvimento]
            ```
            </details>

            ---
            *Esta análise foi gerada automaticamente por IA usando o modelo `${{ vars.OLLAMA_MODEL || 'llama3.2' }}`. Valores são estimativas iniciais.*

      - name: Post comment on issue
        uses: actions/github-script@v7
        env:
          AI_RESPONSE: ${{ steps.ollama.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ✅ 1. Sanitização robusta (remove ANSI, controles, repetições excessivas)
            function cleanAIResponse(raw) {
              if (!raw) return '';
              let s = raw.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, ''); // Remove ANSI
              s = s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, ''); // Remove controles
              s = s.replace(/^```[a-z]*\s*|\s*```$/gi, ''); // Remove fences extras
              s = s.replace(/\n{3,}/g, '\n\n').trim(); // Normaliza quebras
              return s;
            }

            let comment = cleanAIResponse(process.env.AI_RESPONSE || '');

            // ✅ 2. Fallback se a resposta ainda estiver corrompida/vazia
            if (!comment || comment.length < 30) {
              comment = [
                '## ⚠️ Erro na Análise por IA',
                '',
                'A resposta da IA não gerou conteúdo válido.',
                '',
                '**Ação recomendada:** Adicione mais detalhes à issue e re-aplique a label `freelance-request`.',
                '',
                '---',
                '*Esta mensagem foi gerada automaticamente pelo sistema de fallback.*'
              ].join('\n');
            }

            // ✅ 3. Postagem segura (zero template literals no código)
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });