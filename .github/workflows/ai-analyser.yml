name: AI Quick Estimate

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  quick-estimate:
    if: github.event.label.name == 'ok' && github.triggering_actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Get issue data
        id: get_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.get({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.setOutput('body', issue.data.body || '');
            core.setOutput('title', issue.data.title || '');

      - name: Generate estimate with Ollama
        uses: ai-action/ollama-action@v2
        id: ollama
        with:
          model: ${{ vars.OLLAMA_MODEL || 'llama3.2' }}
          prompt: |
            [SISTEMA] Responda APENAS em português do Brasil. Seja direto. Máximo 5 linhas.
            [FORMATO] Siga EXATAMENTE este modelo. Zero texto antes ou depois.
            Quest solicitada por [NOME]
            Tipo de quest: [TIPO]
            Orçamento estimado: R$ [VALOR]
            Sugestão técnica: [STACK + IA em 1 frase]
            Se fizer sentido, entre em contato: [EMAIL]
            
            [REGRAS]
            - Calcule com base em R$150/hora. Se não der para estimar, use R$ 0,00.
            - Use N/A se faltar email ou tipo.
            - Não explique, não saude, não repita.
            
            [ENTRADA]
            Título: ${{ steps.get_issue.outputs.title }}
            Descrição: ${{ steps.get_issue.outputs.body }}
            
            [SAÍDA]

      - name: Post simple comment
        uses: actions/github-script@v7
        env:
          AI_RESPONSE: ${{ steps.ollama.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let raw = process.env.AI_RESPONSE || '';
            
            // ✅ 1. Remove ANSI/códigos de terminal
            raw = raw.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
                     .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '')
                     .trim();
            
            // ✅ 2. Corta qualquer "conversa" do CLI que venha antes ou depois do padrão
            const match = raw.match(/Quest solicitada por[\s\S]*?entre em contato:.*$/i);
            if (match) {
              raw = match[0].trim();
            } else {
              // ✅ 3. Fallback se o modelo ignorou o formato
              raw = '⚠️ Estimativa automática indisponível. Contate o solicitante manualmente para avaliar a quest.';
            }
            
            // ✅ 4. Remove linhas duplicadas consecutivas (loop do modelo)
            const lines = raw.split('\n').filter(l => l.trim());
            const unique = [];
            for (const l of lines) {
              if (unique.length === 0 || unique[unique.length - 1] !== l) unique.push(l);
            }
            raw = unique.join('\n');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: raw
            });