name: AI Issue Analysis & Estimate

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  analyze-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get issue body
        id: get_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.get({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.setOutput('body', issue.data.body || '');
            core.setOutput('title', issue.data.title || '');

      - name: Analyze with Ollama
        uses: ai-action/ollama-action@v2
        id: ollama
        with:
          model: ${{ vars.OLLAMA_MODEL || 'llama3.2' }}
          prompt: |
            Você é um especialista em análise de projetos de software.
            Analise a solicitação abaixo e gere uma resposta formatada em Markdown para ser postada como comentário no GitHub.

            Entrada:
            Título: ${{ steps.get_issue.outputs.title }}
            Descrição: ${{ steps.get_issue.outputs.body }}

            Gere EXATAMENTE este formato Markdown (sem texto antes ou depois):

            ## 🤖 Análise Automática por IA

            ### 📋 Resumo
            [Resumo claro do que foi solicitado em 1-2 frases]

            ### 💰 Orçamento Estimado
            - **Complexidade:** [Baixa|Média|Alta]
            - **Horas estimadas:** [número]h
            - **Valor estimado:** R$ [valor com 2 casas decimais]

            ### 🛠️ Stack Sugerida
            - [`tecnologia1`]
            - [`tecnologia2`]
            - [`tecnologia3`]

            ### 🚀 Prompt para Iniciar o Projeto
            <details>
            <summary>Clique para ver o prompt gerado pela IA</summary>

            ```text
            [Prompt detalhado e otimizado para iniciar o desenvolvimento com IA, incluindo requisitos funcionais, não-funcionais e arquitetura sugerida]
            ```

            </details>

            ---
            *Esta análise foi gerada automaticamente por IA usando o modelo `${{ vars.OLLAMA_MODEL || 'llama3.2' }}`. Valores são estimativas iniciais e podem variar após análise técnica detalhada.*

            Regras:
            - Mantenha o formato Markdown exatamente como mostrado acima
            - Preencha todos os campos, mesmo que com "N/A" se não tiver informação
            - Não adicione texto explicativo antes ou depois do Markdown
            - Use listas com `-` para a stack sugerida

      - name: Post comment on issue
        uses: actions/github-script@v7
        env:
          AI_RESPONSE: ${{ steps.ollama.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const raw = process.env.AI_RESPONSE || '';
            const comment = raw.trim();
            
            // ✅ Fallback simples: se vazio, usa string fixa (sem template literals)
            if (!comment || comment.length < 10) {
              const fallback = [
                '## ⚠️ Erro na Análise por IA',
                '',
                'A resposta da IA está vazia ou inválida.',
                '',
                '**Resposta bruta recebida:**',
                '```',
                raw.substring(0, 500),
                '```',
                '',
                'Tente novamente ou analise manualmente a solicitação.'
              ].join('\n');
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fallback
              });
              return;
            }
            
            // ✅ Resposta válida: posta direto (a IA já gerou Markdown pronto)
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });