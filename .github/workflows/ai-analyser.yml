name: AI Quick Estimate

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  quick-estimate:
    if: github.event.label.name == 'freelance-request' && github.triggering_actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Get issue data
        id: get_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.get({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            core.setOutput('body', issue.data.body || '');
            core.setOutput('title', issue.data.title || '');

      - name: Generate estimate with Ollama
        uses: ai-action/ollama-action@v2
        id: ollama
        with:
          model: ${{ vars.OLLAMA_MODEL || 'llama3.2' }}
          temperature: "0.2"
          prompt: |
            Você é um assistente de pré-venda técnico.
            Analise a solicitação e gere UM PARÁGRAFO CURTO e PRÁTICO em português.

            Formato OBRIGATÓRIO (exatamente assim, sem texto antes/depois):
            ```
            Quest solicitada por [nome]
            Tipo de quest: [tipo]
            Orçamento estimado: R$ [valor com ponto e vírgula]
            Sugestão técnica: [1-2 frases com stack + modelo de IA sugerido]

            Se fizer sentido, entre em contato: [email extraído do corpo]
            ```

            Regras:
            - Máximo 6 linhas
            - Zero emojis, zero markdown complexo
            - Use "N/A" se não encontrar o email
            - Calcule o valor usando R$150/hora com base na complexidade

            Entrada:
            Título: ${{ steps.get_issue.outputs.title }}
            Descrição: ${{ steps.get_issue.outputs.body }}

      - name: Post simple comment
        uses: actions/github-script@v7
        env:
          AI_RESPONSE: ${{ steps.ollama.outputs.response }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let raw = process.env.AI_RESPONSE || '';
            
            // Remove códigos ANSI e controles de terminal
            raw = raw.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '').replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
            raw = raw.replace(/^```[a-z]*\s*|\s*```$/gi, '').trim();
            
            // Fallback mínimo se a IA falhar
            if (raw.length < 20) {
              raw = '⚠️ Não foi possível gerar estimativa automática. Revise a issue e contate o solicitante manualmente.';
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: raw
            });